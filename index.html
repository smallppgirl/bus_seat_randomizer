<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VILLA RC Lucky Draw</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <h1>🎉 VILLA RC Lucky Draw</h1>

    <div class="main-layout">
      <div class="panel-spacer"></div>
      <!-- Left: bus + controls -->
      <div class="left-panel">
        <div id="bus">
          <div class="bus-front">
            <div class="steering-wheel">🚌</div>
            <span>Driver</span>
          </div>
          <div class="seat-grid" id="seatGrid"></div>
        </div>

        <div class="controls">
          <p id="counter">0 / 49 drawn</p>
          <button id="drawBtn">🎲 Draw Next Winner</button>
          <button id="resetBtn">↺ Reset</button>
        </div>

        <div id="winnerBanner" class="winner-banner hidden"></div>
      </div>

      <!-- Right: winner list -->
      <div class="right-panel">
        <div id="winnerList" class="winner-list hidden">
          <h2>Winners</h2>
          <ol id="winnerOl"></ol>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
