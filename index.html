<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COMPASSVALE VILLA RC Prize Draw</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <h1>🎉 COMPASSVALE VILLA RC Prize Draw</h1>

    <div id="bus">
      <!-- Driver area -->
      <div class="bus-front">
        <div class="steering-wheel">🚌</div>
        <span>Driver</span>
      </div>

      <!-- Seat rows 1–11: 4 seats per row (2 | aisle | 2) -->
      <div class="seat-grid" id="seatGrid"></div>
    </div>

    <div class="controls">
      <p id="counter">0 / 49 drawn</p>
      <button id="drawBtn">🎲 Draw Next Winner</button>
      <button id="resetBtn">↺ Reset</button>
    </div>

    <div id="winnerBanner" class="winner-banner hidden"></div>

    <div id="winnerList" class="winner-list hidden">
      <h2>Winners</h2>
      <ol id="winnerOl"></ol>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
